<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
</head>
<body>
    <h1>Nacionalidade de origem</h1>
    Qual sua nacionalidade: <input type="nati" id="nati">
    <input type="button" value="verificar" onclick="responder()">
    <div id="res">

    </div>
    <script>
        function responder() {
            var txtnati = window.document.querySelector('input#nati')
            var res = window.document.querySelector('div#res')
            var resp = String(txtnati.value)
            res.innerHTML = `<p>Sua nacionalidade é <strong>${resp}</strong></p>`
            if (resp == Brasileiro) {
                res.innerHTML = `<p>Você é <strong>BRASILEIRO</strong></p>`
            } else {
                res.innerHTML = `<p>Você é <strong>ESTRANGEIRO</strong></P>`
            }


        }
    </script>
    
</body>
</html>
